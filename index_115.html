<html lang="ja">
<head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRvXOmLV_iU9ybzJrquJSglUYfEON_CsM",
  authDomain: "pourvoussystem.firebaseapp.com",
  projectId: "pourvoussystem",
  storageBucket: "pourvoussystem.firebasestorage.app",
  messagingSenderId: "505648740877",
  appId: "1:505648740877:web:f5b0c3a950866ce74bb344"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
window._db = db;
window._auth = auth;

// ログイン・ログアウト関数
window._signIn = async function(email, password) {
  return await signInWithEmailAndPassword(auth, email, password);
};
window._signOut = async function() {
  return await signOut(auth);
};
window._createUser = async function(email, password) {
  return await createUserWithEmailAndPassword(auth, email, password);
};
window._updateUserPassword = async function(user, newPassword) {
  return await updatePassword(user, newPassword);
};

// ログイン履歴を保存
window._saveLoginLog = async function(uid, email, displayName) {
  try {
    await addDoc(collection(db, "loginLogs"), {
      uid, email, displayName: displayName||"",
      loginAt: new Date().toISOString()
    });
  } catch(e) { console.warn("login log error", e); }
};

// ログイン履歴を取得
window._getLoginLogs = async function(n) {
  try {
    const q = query(collection(db, "loginLogs"), orderBy("loginAt","desc"), limit(n||50));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) { return []; }
};

// ユーザー情報をFirestoreに保存（displayName・shortId管理）
window._saveUserProfile = async function(uid, data) {
  await setDoc(doc(db, "userProfiles", uid), data, {merge:true});
};
window._getUserProfiles = async function() {
  try {
    const snap = await getDocs(collection(db, "userProfiles"));
    return snap.docs.map(d => ({uid: d.id, ...d.data()}));
  } catch(e) { return []; }
};


// 認証状態の監視
onAuthStateChanged(auth, (user) => {
  window._currentUser = user;
  if (!user) {
    // 未ログイン→ログイン画面を表示
    showLoginScreen();
  } else {
    // ログイン済み→アプリ起動
    if (typeof window._appStart === "function" && !window._appStarted) {
      window._appStarted = true;
      if(window._startFirestoreSync){
        window._startFirestoreSync().then(()=>window._appStart());
      } else {
        window._appStart();
      }
    }
  }
});

const FS_KEYS = {
  pv_customers: "customers",
  pv_products: "products",
  pv_prices: "prices",
  pv_history: "history",
  pv_invoice_counters: "invoiceCounters",
  pv_closing_days: "closingDays",
  pv_min: "minG",
  pv_cycles: "cycles",
  pv_adminpass: "adminpass"
};

window._fsSave = async function(k, v) {
  const fsKey = FS_KEYS[k];
  if (!fsKey) return;
  try {
    await setDoc(doc(db, "pvdata", fsKey), { value: JSON.stringify(v) });
  } catch(e) { console.warn("Firestore save error", e); }
};

window._fsLoad = async function(k) {
  const fsKey = FS_KEYS[k];
  if (!fsKey) return null;
  try {
    const snap = await getDoc(doc(db, "pvdata", fsKey));
    if (snap.exists()) return JSON.parse(snap.data().value);
  } catch(e) { console.warn("Firestore load error", e); }
  return null;
};

// リアルタイム同期（ログイン後に開始）
const watchKeys = ["customers","products","prices","history","invoiceCounters","closingDays","minG","cycles"];
window._startRealtimeSync = function() {
watchKeys.forEach(fsKey => {
  const localKey = Object.keys(FS_KEYS).find(k => FS_KEYS[k] === fsKey);
  onSnapshot(doc(db, "pvdata", fsKey), (snap) => {
    if (!snap.exists()) return;
    try {
      const val = JSON.parse(snap.data().value);
      try { localStorage.setItem(localKey, JSON.stringify(val)); } catch{}
      const st = window._state;
      if (st) {
        if (localKey === "pv_customers") st.customers = val;
        else if (localKey === "pv_products") st.products = val;
        else if (localKey === "pv_prices") st.prices = val;
        else if (localKey === "pv_history") st.history = val;
        else if (localKey === "pv_invoice_counters") st.invoiceCounters = val;
        else if (localKey === "pv_closing_days") st.closingDays = val;
        else if (localKey === "pv_min") st.minG = val;
        else if (localKey === "pv_cycles") Object.assign(DELIVERY_CYCLES, val);
      }
      if (st && !st.showPrint && !st.editingHistory && !st.customerDetail && typeof render === "function") {
        render();
      }
    } catch(e) { console.warn("Firestore sync error", e); }
  });
});
}; // end _startRealtimeSync

// 初回起動：Firestoreから最新データをlocalStorageへ同期（ログイン後に実行）
window._startFirestoreSync = async function() {
  window._fsInitPromise = Promise.all(watchKeys.map(async fsKey => {
    const localKey = Object.keys(FS_KEYS).find(k => FS_KEYS[k] === fsKey);
    const val = await window._fsLoad(localKey);
    if (val !== null) {
      try { localStorage.setItem(localKey, JSON.stringify(val)); } catch{}
    }
  }));
  window._startRealtimeSync();
  return window._fsInitPromise;
};
</script>

(function(){try{const saved=localStorage.getItem("pv_cycles");if(saved){const obj=JSON.parse(saved);Object.assign(DELIVERY_CYCLES,obj);}}catch{}})();

function load(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch{return fb;}}
function save(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  if(window._fsSave) window._fsSave(k,v);
}

function fmtDate(d){if(!d)return"";const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return"";return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}`;}
function toInput(d){if(!d)return"";const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return"";return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;}
function fromInput(s){if(!s)return new Date();const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function nextDelivery(name){const cycle=DELIVERY_CYCLES[name];if(!cycle)return new Date();const t=new Date();for(let i=1;i<=7;i++){const d=new Date(t);d.setDate(t.getDate()+i);if(cycle.includes(DAY_NAMES[d.getDay()]))return d;}return new Date();}
function nextInvoiceNo(custName){
  if(custName==="__FREE__"){
    const prefix="999";
    const fromHistory=state.history.filter(h=>h.invoiceNo&&h.invoiceNo.startsWith(prefix+"-P")).map(h=>parseInt((h.invoiceNo.split("-P")[1])||0));
    const fromCounter=state.invoiceCounters[prefix]||0;
    const mx=Math.max(fromCounter,...fromHistory,0);
    return`${prefix}-P${String(mx+1).padStart(3,"0")}`;
  }
  const c=state.customers.find(x=>x.name===custName);
  const prefix=c?c.id:"999";
  const fromHistory=state.history.filter(h=>h.invoiceNo&&h.invoiceNo.startsWith(prefix+"-P")).map(h=>parseInt((h.invoiceNo.split("-P")[1])||0));
  const fromCounter=state.invoiceCounters[prefix]||0;
  const mx=Math.max(fromCounter,...fromHistory,0);
  return`${prefix}-P${String(mx+1).padStart(3,"0")}`;
}
function getSubtotal(){const items=activeItems();return items.reduce((s,i)=>{const q=parseFloat(i.qty)||0;const p=parseFloat(i.price)||0;return s+q*p;},0);}
function activeItems(){if(state.issue.useCustom)return state.issue.customItems.filter(i=>i.name&&i.qty&&parseFloat(i.qty)>0);return state.issue.items.filter(i=>i.qty&&parseFloat(i.qty)>0);}
function getTotal(){const sub=getSubtotal();const mg=state.minG[state.issue.customer]||0;return Math.max(sub,mg);}

function showToast(msg,type="success"){const t=document.getElementById("toast");t.textContent=msg;t.style.background=type==="success"?"#2d6a4f":"#c62828";t.classList.remove("hidden");setTimeout(()=>t.classList.add("hidden"),2500);}

// --- Render ---
function render(){
  renderNav();
  const main=document.getElementById("main");
  if(state.tab===0)main.innerHTML=renderIssueTab();
  else if(state.tab===1)main.innerHTML=renderHistoryTab();
  else if(state.tab===2)main.innerHTML=renderCustomerTab();
  else if(state.tab===3)main.innerHTML=renderProductTab();
  else if(state.tab===4)main.innerHTML=renderPriceTab();
  else if(state.tab===5)main.innerHTML=renderSettingsTab();
  else if(state.tab===6)main.innerHTML=renderGuideTab();
  else if(state.tab===7)main.innerHTML=renderUserTab();
  bindEvents();
  if(state.showPrint)renderPrintModal();
}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML=TABS.map((t,i)=>`<button class="${state.tab===i?"active":""}" onclick="setTab(${i})">${t}</button>`).join("");
  const backBtn=document.getElementById("back-btn");
  if(state.tabHistory.length>0||state.customerDetail){
    backBtn.style.display="inline-block";
  } else {
    backBtn.style.display="none";
  }
}

function setTab(i){
  state.tabHistory.push(state.tab);
  if(state.tabHistory.length>20)state.tabHistory.shift();
  state.tab=i;
  state.customerDetail=null;
  render();
}

function goBack(){
  if(state.customerDetail){state.customerDetail=null;render();return;}
  if(state.tabHistory.length>0){
    state.tab=state.tabHistory.pop();
    render();
  }
}

function selectCustomer(name){
  if(name==="__FREE__"){
    state.issue.freeCustomer=true;
    state.issue.customer="";
    state.issue.items=[];
    state.issue.useCustom=true;
    const today=new Date();today.setDate(today.getDate()+1);
    state.issue.deliveryDate=toInput(today);
    render();return;
  }
  state.issue.freeCustomer=false;
  state.issue.customer=name;
  if(!name){state.issue.items=[];state.issue.deliveryDate="";render();return;}
  state.issue.deliveryDate=toInput(nextDelivery(name));
  const cp=state.prices.filter(p=>p.customer===name);
  state.issue.items=cp.map(p=>({...p,qty:""}));
  state.issue.useCustom=cp.length===0;
  render();
}
function setFreeCustomer(val){state.issue.customer=val;render();}
function setItemQty(i,v){state.issue.items[i].qty=v;render();}
function qtyKeyDown(e,i){
  if(e.key==="Enter"){
    e.preventDefault();
    state.issue.items[i].qty=e.target.value;
    const nextIdx=i+1;
    render();
    // render後にフォーカスを次の入力欄へ移動
    const inputs=document.querySelectorAll("[data-qty-idx]");
    const next=Array.from(inputs).find(el=>parseInt(el.dataset.qtyIdx)===nextIdx);
    if(next){next.focus();next.select();}
    else{const btn=document.querySelector(".issue-btn");if(btn)btn.focus();}
  }
}
function setCustomItem(i,k,v){state.issue.customItems[i][k]=v;render();}
function addCustomItem(){state.issue.customItems.push({name:"",qty:"",price:""});render();}
function removeCustomItem(i){state.issue.customItems.splice(i,1);render();}
function toggleCustom(v){state.issue.useCustom=v;render();}
function issueInvoice(){
  if(!state.issue.customer&&!state.issue.freeCustomer){showToast("客先を選択してください","error");return;}
  if(state.issue.freeCustomer&&!state.issue.customer.trim()){showToast("客先名を入力してください","error");return;}
  const items=activeItems();
  if(!items.length){showToast("数量を入力してください","error");return;}
  const sub=getSubtotal();const mg=state.minG[state.issue.customer]||0;const total=Math.max(sub,mg);
  const invNoKey=state.issue.freeCustomer?"__FREE__":state.issue.customer;
  const inv={id:Date.now(),invoiceNo:nextInvoiceNo(invNoKey),customer:state.issue.customer,deliveryDate:state.issue.deliveryDate?fromInput(state.issue.deliveryDate):new Date(),issueDate:new Date(),items,subtotal:sub,minGuarantee:mg,total,memo:state.issue.memo||"",issuedBy:window._userShortId||"",issuedByName:window._userDisplayName||""};
  state.history.unshift(inv);
  // 発行番号をcountersに保存（履歴削除後も番号を引き継ぐため）
  const invPrefix=inv.invoiceNo.split("-")[0];
  const invNum=parseInt((inv.invoiceNo.split("-P")[1])||0);
  if(!state.invoiceCounters[invPrefix]||state.invoiceCounters[invPrefix]<invNum){
    state.invoiceCounters[invPrefix]=invNum;
    save("pv_invoice_counters",state.invoiceCounters);
  }
  // 3ヶ月より古い履歴を自動削除
  const threeMonthsAgo=new Date();threeMonthsAgo.setMonth(threeMonthsAgo.getMonth()-3);
  state.history=state.history.filter(h=>new Date(h.issueDate)>=threeMonthsAgo);
  save("pv_history",state.history);
  state.issue.freeCustomer=false;state.issue.memo="";
  state.printInvoice=inv;state.showPrint=true;render();
}

function recalcHistoryTotal(){
  const eh=state.editingHistory;
  const sub=eh.items.reduce((s,i)=>(parseFloat(i.qty)||0)*(parseFloat(i.price)||0)+s,0);

  eh.total=Math.max(sub,eh.minGuarantee||0);
  render();
}
function removeHistoryItem(i){state.editingHistory.items.splice(i,1);recalcHistoryTotal();}

function saveHistoryEdit(){
  const eh=state.editingHistory;
  const sub=eh.items.reduce((s,i)=>(parseFloat(i.qty)||0)*(parseFloat(i.price)||0)+s,0);
  const total=Math.max(sub,eh.minGuarantee||0);
  state.history=state.history.map(h=>h.id===eh.id?{...h,invoiceNo:eh.invoiceNo,deliveryDate:eh.deliveryDate?new Date(eh.deliveryDate):h.deliveryDate,items:eh.items,subtotal:sub,total}:h);

}

function openCustomerDetail(id){
  const c=state.customers.find(x=>x.id===id);
  const custPrices=state.prices.filter(p=>p.customer===c.name);
  state.customerDetail={
    id,name:c.name,originalName:c.name,
    mg:state.minG[c.name]||0,
    cycle:DELIVERY_CYCLES[c.name]||"",
    closingDay:state.closingDays[c.name]!==undefined?state.closingDays[c.name]:"",
    prices:custPrices.map(p=>({...p})),
  };
  render();
}

      <div><label class="lbl">客先名</label><input value="${d.name}" oninput="state.customerDetail.name=this.value"></div>

      <thead><tr><th style="width:80px">コード</th><th>品名</th><th style="width:90px;text-align:right">単価</th><th style="width:70px">操作</th></tr></thead>

      <div><label class="lbl">商品コード</label><select id="dp-code" onchange="setDetailNewCode(this.value)"><option value="">-- 選択 --</option>${prodOpts}</select></div>
      <div><label class="lbl">品名</label><input id="dp-name" placeholder="自動入力"></div>
      <div><label class="lbl">単価</label><input id="dp-price" type="number" placeholder="0"></div>

function toggleCycleDay(day){
  const d=state.customerDetail;
  if(d.cycle.includes(day)){d.cycle=d.cycle.replace(day,"");}
  else{
    const order=["月","火","水","木","金","土","日"];
    let c=d.cycle+day;
    d.cycle=order.filter(x=>c.includes(x)).join("");
  }
  render();
}

function setDetailNewCode(v){
  const p=state.products.find(x=>x.code===v);
  document.getElementById("dp-name").value=p?.name||"";
}

function addDetailPrice(){
  const code=document.getElementById("dp-code").value;
  const name=document.getElementById("dp-name").value;
  const price=parseInt(document.getElementById("dp-price").value)||0;
  if(!code||!name){showToast("コードと品名を入力してください","error");return;}
  state.customerDetail.prices.push({customer:state.customerDetail.name,code,name,price});
  render();
}

function removeDetailPrice(i){
  state.customerDetail.prices.splice(i,1);render();
}

function saveCustomerDetail(){
  const d=state.customerDetail;
  state.customers=state.customers.map(c=>c.id===d.id?{...c,name:d.name}:c);
  if(d.originalName!==d.name){
    state.minG[d.name]=state.minG[d.originalName]||0;
    delete state.minG[d.originalName];
    DELIVERY_CYCLES[d.name]=DELIVERY_CYCLES[d.originalName];
    delete DELIVERY_CYCLES[d.originalName];
    state.prices=state.prices.map(p=>p.customer===d.originalName?{...p,customer:d.name}:p);
  }
  state.minG[d.name]=d.mg;
  DELIVERY_CYCLES[d.name]=d.cycle;
  if(d.closingDay!=="")state.closingDays[d.name]=d.closingDay;
  state.prices=state.prices.filter(p=>p.customer!==d.name);
  state.prices.push(...d.prices.map(p=>({...p,customer:d.name})));
  state.customerDetail=null;saveAll();showToast("保存しました");render();
}

function editCustomer(id){const c=state.customers.find(x=>x.id===id);state.editingCustomer={id,name:c.name,originalName:c.name,mg:state.minG[c.name]||0};render();}
function saveCustomer(id){
  const ec=state.editingCustomer;
  state.customers=state.customers.map(c=>c.id===id?{...c,name:ec.name}:c);
  if(ec.originalName!==ec.name){state.minG[ec.name]=state.minG[ec.originalName]||0;delete state.minG[ec.originalName];}
  if(ec.mg!==undefined)state.minG[ec.name]=ec.mg;
  state.editingCustomer=null;saveAll();showToast("更新しました");render();
}
function deleteCustomer(id){if(!confirm("削除しますか？"))return;state.customers=state.customers.filter(c=>c.id!==id);saveAll();showToast("削除しました");render();}
function addCustomer(){
  const nc=state.newCustomer;
  if(!nc.id||!nc.name){showToast("Noと客先名を入力してください","error");return;}
  if(state.customers.find(c=>c.id===nc.id)){showToast("同じNoが存在します","error");return;}
  state.customers.push({id:nc.id,name:nc.name});
  if(nc.cycle)DELIVERY_CYCLES[nc.name]=nc.cycle;
  if(nc.mg)state.minG[nc.name]=parseInt(nc.mg)||0;
  state.newCustomer={id:"",name:"",cycle:"",mg:""};state.showAddCustomer=false;saveAll();showToast("追加しました");render();
}

function toggleNewCycleDay(day){const order=["月","火","水","木","金","土","日"];let c=state.newCustomer.cycle;if(c.includes(day)){c=c.replace(day,"");}else{c=c+day;}state.newCustomer.cycle=order.filter(x=>c.includes(x)).join("");render();}

// --- Product Tab ---
function renderProductTab(){
  const items=state.products.map(p=>{
    if(state.editingProduct?.code===p.code)return`<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1.5px solid #1a73e8;border-radius:8px;background:#f0f7ff"><input value="${state.editingProduct.code}" onchange="state.editingProduct.code=this.value" style="width:62px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;text-align:center"><input value="${state.editingProduct.name}" onchange="state.editingProduct.name=this.value" style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px"><button class="btn-save" onclick="saveProduct('${p.code}')">✓ 保存</button><button class="btn-cancel" onclick="state.editingProduct=null;render()">✕</button></div>`;
    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:.5px solid #e8e5df;border-radius:8px"><span class="code-badge" style="min-width:48px;text-align:center">${p.code}</span><span style="flex:1;font-size:13px">${p.name}</span><button class="btn-edit" onclick="state.editingProduct={code:'${p.code}',name:'${p.name}'};render()">編集</button><button class="btn-danger" onclick="deleteProduct('${p.code}')">削除</button></div>`;
  }).join("");
  if(state.showAddProduct&&!state.newProduct.code){state.newProduct.code=nextProductCode();}
  const addForm=state.showAddProduct?`<div class="card" style="background:#fffef7;margin-bottom:16px"><div style="display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:end">
    <div><label class="lbl">商品コード（自動）</label><input value="${state.newProduct.code}" oninput="state.newProduct.code=this.value"></div>
    <div><label class="lbl">品名</label><input placeholder="品名" value="${state.newProduct.name}" oninput="state.newProduct.name=this.value"></div>
    <button class="btn-primary" onclick="addProduct()">追加</button></div></div>`:"";
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">商品管理</h2><button class="btn-primary" onclick="state.showAddProduct=!state.showAddProduct;state.newProduct={code:'',name:''};render()">＋ 商品追加</button></div>
  ${addForm}<div class="card"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${items}</div></div>`;
}
function saveProduct(oldCode){
  const ep=state.editingProduct;
  if(!ep.code||!ep.name){showToast("コードと品名を入力してください","error");return;}
  if(ep.code!==oldCode&&state.products.find(p=>p.code===ep.code)){showToast("同じコードが存在します","error");return;}
  state.products=state.products.map(p=>p.code===oldCode?{code:ep.code,name:ep.name}:p);
  if(ep.code!==oldCode){state.prices=state.prices.map(p=>p.code===oldCode?{...p,code:ep.code,name:ep.name}:p);}
  state.editingProduct=null;saveAll();showToast("更新しました");render();
}
function deleteProduct(code){if(!confirm("削除しますか？"))return;state.products=state.products.filter(p=>p.code!==code);saveAll();showToast("削除しました");render();}
function nextProductCode(){const codes=state.products.map(p=>p.code).filter(c=>/^W\d+$/.test(c)).map(c=>parseInt(c.replace("W","")));const mx=codes.length?Math.max(...codes):0;return"W"+String(mx+1).padStart(3,"0");}
function addProduct(){const np=state.newProduct;if(!np.code||!np.name){showToast("コードと品名を入力","error");return;}if(state.products.find(p=>p.code===np.code)){showToast("同じコードが存在します","error");return;}state.products.push({code:np.code,name:np.name});state.newProduct={code:"",name:""};state.showAddProduct=false;saveAll();showToast("追加しました");render();}

    <div><label class="lbl">品名（省略可）</label><input value="${state.newPrice.name}" oninput="state.newPrice.name=this.value"></div>
    <div><label class="lbl">単価</label><input type="number" value="${state.newPrice.price}" oninput="state.newPrice.price=this.value" placeholder="0"></div>
    <button class="btn-primary" onclick="addPrice()">追加</button></div></div>`:"";
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-size:20px;font-weight:600;color:#1a1a2e;margin:0">単価対応表</h2><button class="btn-primary" onclick="state.showAddPrice=!state.showAddPrice;render()">＋ 追加</button></div>
  ${addForm}<div class="card">
  <select onchange="state.filterCustomer=this.value;render()" style="margin-bottom:16px;padding:8px 12px;border:1px solid #ddd;border-radius:8px"><option value="">全客先表示</option>${custOpts}</select>
  <div style="font-size:13px;color:#888;margin-bottom:8px">${filtered.length} 件</div>
  <table><thead><tr><th>客先名</th><th>コード</th><th>品名</th><th style="text-align:right">単価</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setNewPriceCode(v){const p=state.products.find(x=>x.code===v);state.newPrice.code=v;state.newPrice.name=p?.name||"";}
function savePrice(i){const ep=state.editingPrice;state.prices[i]={...state.prices[i],name:ep.name,price:ep.price};state.editingPrice=null;saveAll();showToast("更新しました");render();}
function deletePrice(i){if(!confirm("削除しますか？"))return;state.prices.splice(i,1);saveAll();showToast("削除しました");render();}
function addPrice(){const np=state.newPrice;if(!np.customer||!np.code||!np.price){showToast("必須項目を入力してください","error");return;}const prod=state.products.find(p=>p.code===np.code);const name=np.name||prod?.name||np.code;state.prices.push({customer:np.customer,code:np.code,name,price:parseInt(np.price)});state.newPrice={customer:"",code:"",name:"",price:""};state.showAddPrice=false;saveAll();showToast("追加しました");render();}

function b64ToAB(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const arr = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return buf;
}

// 締め日から対象期間を計算
// closingDay: 20/25/0(月末)
// baseYM: {year, month} = 締め日が含まれる月
// 戻り値: {from: Date, to: Date}
function getClosingPeriod(closingDay, baseYear, baseMonth) {
  let to, from;
  if (closingDay === 0) {
    // 月末締め: 当月1日〜当月末日
    to = new Date(baseYear, baseMonth, 0); // 月末
    from = new Date(baseYear, baseMonth - 1, 1);
  } else {
    // N日締め: 前月(N+1)日〜当月N日
    to = new Date(baseYear, baseMonth - 1, closingDay);
    from = new Date(baseYear, baseMonth - 2, closingDay + 1);
  }
  return { from, to };
}

function dateInRange(dateVal, from, to) {
  const d = new Date(dateVal);
  if (isNaN(d)) return false;
  const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const f = new Date(from.getFullYear(), from.getMonth(), from.getDate());
  const t = new Date(to.getFullYear(), to.getMonth(), to.getDate());
  return dd >= f && dd <= t;
}

// 伝票リスト（最大14枚）を1シートに書き込む
function fillSheet(wb, invoices, sheetLabel, yr, mo) {
  // テンプレートをコピー（スタイル・数式・結合を完全保持）
  const templateWb = XLSX.read(b64ToAB(BLANK_XLSX_B64), {type:"array", cellStyles:true});
  const templateWs = templateWb.Sheets[templateWb.SheetNames[0]];
  const ws = JSON.parse(JSON.stringify(templateWs));

  // セルに値をセットするヘルパー（既存スタイルを保持しつつ値だけ更新）
  function setCell(addr, type, value) {
    if (!ws[addr]) ws[addr] = {};
    ws[addr].t = type;
    ws[addr].v = value;
    if (type === "n" && typeof value === "string" && value.startsWith("=")) {
      ws[addr].t = "n";
      ws[addr].f = value.slice(1);
      ws[addr].v = 0;
    }
  }

  // ── ヘッダー部分 ──
  // A5: 客先名（A5:F5結合セル）
  setCell("A5", "s", sheetLabel.replace(/\(\d+\)$/, "").trim());
  // O3: 年（数字）, Q3: 月（数字）
  setCell("O3", "n", yr);
  setCell("Q3", "n", mo);
  // A9: 締め日表示（客先の締め日に合わせて自動表示）
  const closingDay = state.closingDays[sheetLabel.replace(/_\d+年\d+月$/, "").replace(/\(\d+\)$/, "").trim()];
  const shimeLbl = (closingDay === 0) ? "月末〆" : (closingDay ? closingDay + "日〆" : "25日〆");
  setCell("A9", "s", shimeLbl);

  const colLetters = ["C","D","E","F","G","H","I","J","K","L","M","N","O","P"];

  // ── 行10: 伝票番号 / 行11: 納品日 ──
  invoices.forEach((inv, i) => {
    if (i >= 14) return;
    const col = colLetters[i];
    setCell(col + "10", "s", inv.invoiceNo || "");
    const d = new Date(inv.deliveryDate);
    // 納品日をM/D形式で表示（例: 5/2）
    const mdDate = isNaN(d) ? "" : (d.getMonth()+1) + "/" + d.getDate();
    setCell(col + "11", "s", mdDate);
  });

  // ── 品名の収集（登場順を保持）──
  const productOrder = [];
  const productSet = new Set();
  invoices.forEach(inv => {
    (inv.items || []).forEach(it => {
      if (it.name && !productSet.has(it.name)) {
        productOrder.push(it.name);
        productSet.add(it.name);
      }
    });
  });

  // 単価マップ（最後に登場した値を使用）
  const priceMap = {};
  invoices.forEach(inv => {
    (inv.items || []).forEach(it => { if (it.name) priceMap[it.name] = it.price || 0; });
  });

  // ── 行12〜: 品名・単価・数量 ──
  productOrder.forEach((pname, rowIdx) => {
    const excelRow = 12 + rowIdx;
    setCell("A" + excelRow, "s", pname);
    setCell("B" + excelRow, "n", priceMap[pname] || 0);

    // C〜P列: 各伝票の数量
    invoices.forEach((inv, invIdx) => {
      if (invIdx >= 14) return;
      const item = (inv.items || []).find(it => it.name === pname);
      const qty = item ? (parseFloat(item.qty) || 0) : 0;
      if (qty > 0) setCell(colLetters[invIdx] + excelRow, "n", qty);
    });
    // Q・R列の数式はテンプレート既存のものをそのまま使用（上書きしない）
  });

  // !ref を更新（最大44行 or データ行数に合わせる）
  ws["!ref"] = "A1:R" + Math.max(44, 11 + productOrder.length);

  const safeLabel = sheetLabel.substring(0, 31);
  XLSX.utils.book_append_sheet(wb, ws, safeLabel);
}

// 客先+伝票リストからワークブックにシートを追加（14枚超えで自動分割）
function appendSheetsForCustomer(wb, customer, invoices, yr, mo) {
  const pageSize = 14;
  const pages = Math.ceil(invoices.length / pageSize);
  const baseName = customer.replace(/[\/\\:*?\[\]]/g, "").substring(0, pages > 1 ? 28 : 31);
  for (let p = 0; p < pages; p++) {
    const chunk = invoices.slice(p * pageSize, (p + 1) * pageSize);
    const label = pages > 1 ? baseName + `(${p+1})` : baseName;
    fillSheet(wb, chunk, label, yr, mo);
  }
}

// 今日の発行分を書き出し
function exportTodayExcel() {
  const todayStr = fmtDate(new Date());
  const filtered = state.history.filter(h => fmtDate(new Date(h.deliveryDate)) === todayStr);
  if (filtered.length === 0) { showToast("今日の発行履歴がありません", "error"); return; }
  const d = new Date();
  const yr = d.getFullYear(), mo = d.getMonth() + 1;
  const byCustomer = {};
  filtered.forEach(h => {
    const c = h.customer || "（客先不明）";
    if (!byCustomer[c]) byCustomer[c] = [];
    byCustomer[c].push(h);
  });
  const wb = XLSX.utils.book_new();
  Object.keys(byCustomer).forEach(c => appendSheetsForCustomer(wb, c, byCustomer[c], yr, mo));
  const fname = `請求明細書_${yr}年${mo}月${d.getDate()}日.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(`${fname} をダウンロードしました`);
}

// 締め日期間で書き出し
function exportClosingExcel() {
  const custEl = document.getElementById("export-cust");
  const monthEl = document.getElementById("export-month");
  if (!monthEl || !monthEl.value) { showToast("年月を選択してください", "error"); return; }
  const [yrStr, moStr] = monthEl.value.split("-");
  const baseYear = parseInt(yrStr), baseMonth = parseInt(moStr);
  const selCust = custEl ? custEl.value : "";

  // 対象客先を絞り込む
  let targets = state.customers.filter(c => state.closingDays[c.name] !== undefined && state.closingDays[c.name] !== "");
  if (selCust) targets = targets.filter(c => c.name === selCust);
  if (targets.length === 0) { showToast("締め日が設定された客先がありません", "error"); return; }

  const wb = XLSX.utils.book_new();
  let totalSheets = 0;

  targets.forEach(cust => {
    const closingDay = state.closingDays[cust.name];
    const { from, to } = getClosingPeriod(closingDay, baseYear, baseMonth);
    const invoices = state.history.filter(h =>
      h.customer === cust.name && dateInRange(h.deliveryDate, from, to)
    );
    if (invoices.length === 0) return;
    // 日付順にソート
    invoices.sort((a, b) => new Date(a.deliveryDate) - new Date(b.deliveryDate));
    appendSheetsForCustomer(wb, cust.name, invoices, baseYear, baseMonth);
    totalSheets++;
  });

  if (totalSheets === 0) { showToast("該当期間に発行履歴がありません", "error"); return; }
  const fname = `請求明細書_${baseYear}年${baseMonth}月締め.xlsx`;
  XLSX.writeFile(wb, fname);
  showToast(`${fname} をダウンロードしました（${totalSheets}客先）`);
}


// 明細書Excel用JSONを書き出す
// 締め日ごとに客先別・期間別で集計したデータを出力
function exportMeisaiJson() {
  const today = new Date();
  const todayDay = today.getDate();

  // 客先ごとに「どの請求月に属するか」を自動判定して集計
  const meisaiData = [];

  state.customers.forEach(cust => {
    const closingDay = state.closingDays[cust.name];

    // 締め日から請求対象期間を計算
    // 締め日未設定 → 当月1日〜末日
    let from, to, billingYear, billingMonth;
    const cd = (closingDay !== undefined && closingDay !== "") ? closingDay : 0;

    if (cd === 0) {
      // 月末締め: 当月1日〜当月末日
      billingYear  = today.getFullYear();
      billingMonth = today.getMonth() + 1;
      from = new Date(billingYear, billingMonth - 1, 1);
      to   = new Date(billingYear, billingMonth, 0);
    } else {
      // N日締め: 今日が締め日以前 → 当月締め期間 / 締め日を過ぎた → 翌月締め期間
      if (todayDay <= cd) {
        // 当月締め期間: 前月(cd+1)日 〜 今月cd日
        billingYear  = today.getFullYear();
        billingMonth = today.getMonth() + 1;
      } else {
        // 翌月締め期間: 今月(cd+1)日 〜 来月cd日
        const next = new Date(today.getFullYear(), today.getMonth() + 1, 1);
        billingYear  = next.getFullYear();
        billingMonth = next.getMonth() + 1;
      }
      from = new Date(billingYear, billingMonth - 2, cd + 1);
      to   = new Date(billingYear, billingMonth - 1, cd);
    }

    const invoices = state.history.filter(h =>
      h.customer === cust.name && dateInRange(h.deliveryDate, from, to)
    );
    if (invoices.length === 0) return;

    invoices.sort((a, b) => new Date(a.deliveryDate) - new Date(b.deliveryDate));

    // シート名: 客先名_YYYY年M月
    const sheetName = cust.name + "_" + billingYear + "年" + billingMonth + "月";

    meisaiData.push({
      customer:    cust.name,
      sheetName:   sheetName,
      year:        billingYear,
      month:       billingMonth,
      closingDay:  cd,
      periodFrom:  fmtDate(from),
      periodTo:    fmtDate(to),
      invoices: invoices.map(inv => ({
        invoiceNo:    inv.invoiceNo || "",
        deliveryDate: fmtDate(new Date(inv.deliveryDate)),
        items: (inv.items || []).map(it => ({
          name:  it.name  || "",
          price: it.price || 0,
          qty:   parseFloat(it.qty) || 0
        })).filter(it => it.name && it.qty > 0)
      }))
    });
  });

  if (meisaiData.length === 0) {
    showToast("現在の締め期間に発行履歴がありません", "error");
    return;
  }

  const output = {
    exportDate: new Date().toISOString(),
    meisaiData
  };

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `明細書データ_${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日.json`;
  a.click();

  // 書き出し内容のサマリーをトーストで表示
  const summary = meisaiData.map(d => d.sheetName + "（" + d.invoices.length + "件）").join("、");
  showToast("書き出し完了：" + summary);
}

function renderPrintModal(){
  const inv=state.printInvoice;if(!inv)return;
  const modal=document.getElementById("print-modal");
  modal.classList.remove("hidden");
  const displayItems=inv.items.filter(i=>parseFloat(i.qty)>0);
  const maxRows=11;
  const bdr="1px solid #000";
  const isMulti=displayItems.length>maxRows;

  // 1ページ分のHTMLを生成（items・showTotal・showBiko・pageLabel・isCtrl）
  function calcCustomerFontSize(name){
    const len=(name||"").length;
    if(len<=18)return 17;
    if(len<=30)return 15;
    if(len<=42)return 13.5;
    if(len<=60)return 12;
    return 10.5;
  }
  function block(items,showTotal,showBiko,pageLabel,isCtrl){
    const padded=[...items];
    const rows_n=isMulti?maxRows:maxRows;
    while(padded.length<rows_n)padded.push(null);
    const subtotal=items.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
    const rows=padded.map(item=>`<tr style="height:9mm"><td style="border:${bdr};padding:0px 5px;font-size:12.5px">${item?item.name:"\u00a0"}</td><td style="border:${bdr};padding:0px 4px;text-align:center;font-size:12.5px;width:44px">${item?item.qty:""}</td><td style="border:${bdr};padding:0px 4px;text-align:right;font-size:12.5px;width:58px">${item?item.price.toLocaleString():""}</td><td style="border:${bdr};padding:0px 4px;text-align:right;font-size:12.5px;width:68px">${item?(parseInt(item.qty)*item.price).toLocaleString():""}</td></tr>`).join("");
    const totalVal=showTotal?Math.max(subtotal,inv.minGuarantee||0):null;
    return`<div style="flex:1;min-width:0;padding:0 3px;font-family:'MS Mincho',serif;display:flex;flex-direction:column;height:100%">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1px">
        <div style="font-size:22px;font-weight:700">${isCtrl?"受領書":"納品書"}${pageLabel?`<span style="font-size:13px;margin-left:8px">${pageLabel}</span>`:""}</div>
        <div style="font-size:15px">\u00a0\u00a0 № ${inv.invoiceNo}</div>
      </div>
      <div style="border:${bdr};padding:0 8px;margin-bottom:2px;height:15mm;position:relative"><span style="font-size:${calcCustomerFontSize(inv.customer)}px;font-weight:700;white-space:normal;word-break:break-word;line-height:1.12;display:block;padding-right:92px;padding-top:2px">${inv.customer}</span><span style="position:absolute;top:2px;right:8px;white-space:nowrap;font-size:${calcCustomerFontSize(inv.customer)}px;font-weight:700">様</span><span style="position:absolute;right:8px;bottom:3px;font-size:11px;color:#333;white-space:nowrap">納品日　<strong style="font-size:13px">${fmtDate(inv.deliveryDate)}</strong></span></div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;height:105mm">
        <thead><tr>
          <th style="border:${bdr};padding:3px 6px;text-align:center;background:#f0f0f0;font-size:12px">品\u3000名</th>
          <th style="border:${bdr};padding:3px 4px;width:63px;text-align:center;background:#f0f0f0;font-size:12px">数量</th>
          <th style="border:${bdr};padding:3px 4px;width:58px;text-align:center;background:#f0f0f0;font-size:12px">単\u3000価</th>
          <th style="border:${bdr};padding:3px 4px;width:87px;text-align:center;background:#f0f0f0;font-size:12px">金\u3000額</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="display:flex;justify-content:flex-end;border:${bdr};border-top:2px solid #000;margin-top:-1px">
        <div style="border-left:${bdr};padding:3px 8px;font-size:11px;display:flex;align-items:center">${showTotal?"合\u3000計":"小\u3000計"}</div>
        <div style="padding:3px 10px;font-size:16px;font-weight:700;min-width:85px;text-align:right">¥${showTotal?totalVal.toLocaleString():subtotal.toLocaleString()}</div>
      </div>
      ${showTotal&&inv.minGuarantee>0&&inv.subtotal<inv.minGuarantee?`<div style="font-size:10px;color:#888;text-align:right">（最低保証 ¥${inv.minGuarantee.toLocaleString()} 適用）</div>`:""}
      ${showBiko?`<div style="border:${bdr};border-top:none;flex-shrink:0;min-height:59px;padding:2px 6px;margin-top:-1px"><div style="font-size:10px;color:#555;margin-bottom:1px">備\u3000考</div><div style="font-size:11.5px;line-height:1.5;white-space:pre-wrap">${inv.memo||"\u00a0"}</div></div>`:""}
      <div style="display:flex;justify-content:space-between;border:${bdr};border-top:none;height:19mm;margin-top:-1px">
        ${isCtrl?`<div style="border-right:${bdr};min-width:17mm;width:17mm;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:2px"><span style="font-size:9px">受領印</span></div>`:""}
        <div style="padding:2px 8px 2px 0;font-size:10.5px;line-height:1.3;text-align:right;white-space:nowrap;overflow:hidden;display:flex;flex-direction:column;justify-content:center;letter-spacing:-0.03em;flex:1">
          <div style="font-weight:700;font-size:12px"><span style="font-size:13px">${COMPANY.name}</span><span style="font-size:9.5px">${COMPANY.division}</span></div>
          <div>${COMPANY.zip}${COMPANY.address}</div>
          <div>${COMPANY.tel}　${COMPANY.fax}</div>
        </div>
      </div>
    </div>`;
  }

  // ページ分割
  const pages=[];
  if(!isMulti){
    pages.push({items:displayItems,showTotal:true,showBiko:true,label:""});
  } else {
    for(let i=0;i<displayItems.length;i+=maxRows){
      const chunk=displayItems.slice(i,i+maxRows);
      const isLast=i+maxRows>=displayItems.length;
      const pg=Math.floor(i/maxRows)+1;
      const total=Math.ceil(displayItems.length/maxRows);
      pages.push({items:chunk,showTotal:isLast,showBiko:isLast,label:`(${pg}/${total})`});
    }

  const div=s=>`<div style="width:20px;min-width:20px;display:flex;align-items:center;justify-content:center"><div style="border-left:1px dashed #aaa;height:100%"></div></div>`;

    <div style="display:flex;gap:0;background:#fff;width:100%;box-sizing:border-box">
      ${block(p.items,p.showTotal,p.showBiko,p.label,false)}
      ${div()}
      ${block(p.items,p.showTotal,p.showBiko,p.label,true)}
    </div>`).join("");

  // 印刷用HTML（print-area）
  const printHtml=pages.map((p,pi)=>`
    <div class="slot">${block(p.items,p.showTotal,p.showBiko,p.label,false)}</div>
    <div class="dv"><div style="border-left:1px dashed #aaa;height:100%"></div></div>
    <div class="slot">${block(p.items,p.showTotal,p.showBiko,p.label,true)}</div>
    `).join("");

  modal.innerHTML=`<div style="background:#fff;border-radius:12px;padding:24px;max-width:920px;width:95%;max-height:90vh;overflow-y:auto">
    <div style="display:flex;gap:12px;justify-content:flex-end;align-items:center;margin-bottom:16px">
      <button class="btn-cancel" style="padding:10px 20px;font-size:15px" onclick="closePrint()">閉じる</button>
      <button onclick="downloadCSV(state.printInvoice)" style="background:#2e7d32;color:#fff;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600">⬇ CSVダウンロード</button>
      <button class="btn-primary" style="padding:10px 28px;font-size:15px" onclick="doPrint()">印刷（B5横）</button>
    </div>
    ${previewHtml}
    <div style="margin-top:12px;font-size:13px;color:#c00;text-align:center;font-weight:600">⚠️ 印刷設定：用紙B5・横向き・<u>余白「なし」</u> を必ず選択してください</div>
  </div>`;

  // print-area をbody直下に設置
  let pa=document.getElementById("print-area");
  if(!pa){pa=document.createElement("div");pa.id="print-area";document.body.appendChild(pa);}
  pa.innerHTML=printHtml;
}
function downloadCSV(inv){
  if(!inv)return;
  var BOM="\uFEFF";
  var header=["納品日","客先名","品名","数量","単価","金額","合計金額","備考"];
  var rows=inv.items.map(function(item,i){
    return [
      fmtDate(inv.deliveryDate),
      inv.customer,
      item.name,
      item.qty,
      item.price,
      parseInt(item.qty)*item.price,
      i===0?inv.total:"",
      i===0?(inv.memo||""):""
    ];
  });
  function esc(v){
    var s=String(v!==null&&v!==undefined?v:"");
    return (s.indexOf(",")>=0||s.indexOf('"')>=0||s.indexOf("\n")>=0)?'"'+s.replace(/"/g,'""')+'"':s;
  }
  var lines=[header].concat(rows).map(function(r){return r.map(esc).join(",");});
  var csv=BOM+lines.join("\r\n");
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  var d=fmtDate(inv.deliveryDate).replace(/\//g,"");
  a.href=url;
  a.download="納品書_"+inv.invoiceNo+"_"+d+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("CSVをダウンロードしました");
}
function doPrint(){
  const pa=document.getElementById("print-area");
  if(!pa)return;
  const inner=pa.innerHTML;
  const css=''
    +'*{box-sizing:border-box;margin:0;padding:0}'
    +'@page{size:257mm 168mm landscape;margin:0}'
    +'html,body{margin:0;padding:0;width:257mm;height:168mm;overflow:hidden;background:#fff;-webkit-print-color-adjust:exact;font-family:"MS Mincho",serif}'
    +'.wrap{position:absolute;top:0;left:0;width:257mm;height:168mm;overflow:hidden}'
    +'.inner{position:absolute;top:0;left:0;width:257mm;height:168mm;transform:translate(10.3mm,9.7mm) scale(0.92);transform-origin:top left;display:flex}'
    +'.slot{flex:1;min-width:0;max-width:calc(50% - 10px);padding:1mm 3mm}'
    +'.dv{flex:0 0 39px;width:39px;display:flex;align-items:center;justify-content:center}'
    +'table{table-layout:fixed;width:100%;border-collapse:collapse}'
    +'tbody tr{height:9mm}'
    +'thead th{padding:2px 4px}';
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+css+'</style></head>'
    +'<body><div class="wrap"><div class="inner">'+inner+'</div></div></body></html>';
  const ifr=document.createElement("iframe");
  ifr.style.cssText="position:fixed;top:-9999px;left:-9999px;width:257mm;height:168mm;border:none;";
  document.body.appendChild(ifr);
  const doc=ifr.contentDocument||ifr.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  setTimeout(function(){
    ifr.contentWindow.focus();
    ifr.contentWindow.print();
    setTimeout(function(){document.body.removeChild(ifr);},500);
  },600);
}
function closePrint(){state.showPrint=false;state.printInvoice=null;document.getElementById("print-modal").classList.add("hidden");document.getElementById("print-modal").innerHTML="";const pa=document.getElementById("print-area");if(pa)pa.remove();}

function bindEvents(){

  window.onbeforeunload=function(e){
    if(window._currentUser){

    }
  };
}

function showLoginScreen(){
  document.getElementById("login-screen").classList.remove("hidden");
  document.querySelector(".header").style.display="none";
  document.getElementById("main").style.display="none";
}
function hideLoginScreen(){
  document.getElementById("login-screen").classList.add("hidden");
  document.querySelector(".header").style.display="";
  document.getElementById("main").style.display="";
}
async function doLogin(){
  const password=document.getElementById("login-password").value;
  const errEl=document.getElementById("login-error");
  errEl.textContent="";
  errEl.style.color="#c62828";
  if(!password){errEl.textContent="パスワードを入力してください";return;}

  try{
    const profiles=await window._getUserProfiles().catch(()=>[]);

    // userProfilesが空→初回ログイン→メールアドレス入力欄を表示
    if(!profiles||profiles.length===0){
      const emailField=document.getElementById("login-email-field");
      const emailInput=document.getElementById("login-email");
      if(emailField.style.display==="none"){
        emailField.style.display="block";
        errEl.style.color="#1565c0";
        errEl.textContent="初回ログインです。メールアドレスも入力してください。";
        return;
      }
      const email=emailInput.value.trim();
      if(!email){errEl.style.color="#c62828";errEl.textContent="メールアドレスを入力してください";return;}
      try{
        const cred=await window._signIn(email,password);
        const user=cred.user;
        window._userShortId="";
        window._userDisplayName=email.split("@")[0];
        const hu=document.getElementById("header-user");
        if(hu)hu.textContent=window._userDisplayName;
        await window._saveLoginLog(user.uid,email,window._userDisplayName);
        hideLoginScreen();
        if(!window._appStarted){
          window._appStarted=true;
          await window._startFirestoreSync();
          window._fsInitPromise.then(()=>window._appStart());
        }
      }catch(e){
        errEl.style.color="#c62828";
        errEl.textContent="メールアドレスまたはパスワードが正しくありません";
      }
      return;
    }

    // userProfilesあり→パスワードで照合
    let loggedIn=false;
    for(const prof of profiles){
      const emails=[];
      if(prof.email)emails.push(prof.email);
      if(prof.shortId)emails.push(prof.shortId.toLowerCase()+"@pv.local");
      for(const email of emails){
        try{
          const cred=await window._signIn(email,password);
          const user=cred.user;
          window._userShortId=prof.shortId||"";
          window._userDisplayName=prof.displayName||email.split("@")[0];
          const hu=document.getElementById("header-user");
          if(hu)hu.textContent=(window._userShortId?`[${window._userShortId}] `:"")+window._userDisplayName;
          await window._saveLoginLog(user.uid,email,window._userDisplayName);
          hideLoginScreen();
          if(!window._appStarted){
            window._appStarted=true;
            await window._startFirestoreSync();
            window._fsInitPromise.then(()=>window._appStart());
          }
          loggedIn=true;
          break;
        }catch(e){continue;}
      }
      if(loggedIn)break;
    }
    if(!loggedIn){errEl.textContent="パスワードが正しくありません";}
  }catch(e){
    console.error("Login error:", e.code, e.message);
    errEl.textContent="エラー："+e.code+" / "+e.message;
  }
}

async function doLogout(){
  if(!confirm("ログアウトしますか？"))return;
  await window._signOut();
  window._appStarted=false;
  window._userShortId="";
  window._userDisplayName="";
  showLoginScreen();
}

    </div>`;
  }
  // 非同期なので専用のローディング画面を返してから非同期で中身を描画
  setTimeout(()=>renderUserTabContent(), 0);
  return`<h2 style="font-size:20px;font-weight:600;margin-bottom:20px;color:#1a1a2e">👤 ユーザー管理</h2>
  <div id="user-tab-body"><div style="text-align:center;padding:40px;color:#aaa">読み込み中...</div></div>`;
}

function checkUserAdminPass(){
  const p=document.getElementById("user-admin-pass").value;
  if(p===_userTabAdminPass){_userTabUnlocked=true;render();}
  else{document.getElementById("user-admin-err").textContent="パスワードが違います";}
}

async function renderUserTabContent(){
  
  const profiles=await window._getUserProfiles()||[];
  const logs=await window._getLoginLogs(30)||[];
  
  const profileRows=profiles.map(p=>`
    <tr>
      <td style="font-size:13px">${p.email||""}</td>
      <td style="text-align:center"><span style="background:#e8d5b7;padding:2px 10px;border-radius:4px;font-weight:700;font-size:13px">${p.shortId||"—"}</span></td>
      <td style="font-size:13px">${p.displayName||""}</td>
      <td><button class="btn-danger" onclick="deleteUserProfile('${p.uid}')">削除</button></td>
    </tr>`).join("");

  const logRows=logs.map(l=>`
    <tr>
      <td style="font-size:12px">${l.loginAt?new Date(l.loginAt).toLocaleString("ja-JP"):""}</td>
      <td style="text-align:center"><span style="background:#e8d5b7;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:700">${l.displayName||"—"}</span></td>
    </tr>`).join("");

  document.getElementById("user-tab-body").innerHTML=`
  <div class="card">
    <h3>ユーザー一覧</h3>
    <table style="margin-bottom:16px"><thead><tr>
      <th>メールアドレス</th><th style="width:80px;text-align:center">略称ID</th><th>表示名</th><th style="width:60px">操作</th>
    </tr></thead><tbody>${profileRows||'<tr><td colspan="4" style="text-align:center;color:#aaa;padding:20px">ユーザーなし</td></tr>'}</tbody></table>
    <div style="border-top:1px solid #f0ede8;padding-top:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">新規ユーザーを追加</div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:end">
        <div><label class="lbl">メールアドレス <span style="font-size:10px;color:#888">（管理用・ログインには使いません）</span></label><input id="new-user-email" type="email" placeholder="xxx@mail.com"></div>
        <div><label class="lbl">パスワード</label><input id="new-user-pass" type="password" placeholder="パスワード"></div>
        <div><label class="lbl">略称ID（例：YK）</label><input id="new-user-short" placeholder="YK" style="text-transform:uppercase"></div>
        <div><label class="lbl">表示名</label><input id="new-user-name" placeholder="山田太郎"></div>
        <button class="btn-primary" onclick="addNewUser()" style="margin-top:20px">追加</button>
      </div>
      <div id="new-user-err" style="color:#c62828;font-size:13px;margin-top:8px"></div>
    </div>
  </div>
  <div class="card">
    <h3>管理者パスワードの変更</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end">
      <div><label class="lbl">新しいパスワード</label><input id="new-admin-pass" type="password" placeholder="新しいパスワード"></div>
      <div><label class="lbl">確認</label><input id="new-admin-pass2" type="password" placeholder="もう一度入力"></div>
      <button class="btn-primary" onclick="changeAdminPass()">変更</button>
    </div>
    <div id="admin-pass-msg" style="font-size:13px;margin-top:8px"></div>
  </div>
  <div class="card">
    <h3>ログイン履歴（直近30件）</h3>
    <table><thead><tr><th>日時</th><th style="text-align:center;width:80px">略称ID</th></tr></thead>
    <tbody>${logRows||'<tr><td colspan="3" style="text-align:center;color:#aaa;padding:20px">履歴なし</td></tr>'}</tbody></table>
  </div>`;
}

async function addNewUser(){
  const pass=document.getElementById("new-user-pass").value;
  const shortId=document.getElementById("new-user-short").value.trim().toUpperCase();
  const displayName=document.getElementById("new-user-name").value.trim();
  const errEl=document.getElementById("new-user-err");
  errEl.textContent="";
  if(!pass||!shortId||!displayName){errEl.textContent="すべての項目を入力してください";return;}
  // メールアドレスはshortId@pv.localで自動生成
  const email=shortId.toLowerCase()+"@pv.local";
  try{
    const cred=await window._createUser(email,pass);
    await window._saveUserProfile(cred.user.uid,{email,shortId,displayName});
    errEl.style.color="#2e7d32";
    errEl.textContent="追加しました！";
    renderUserTabContent();
  }catch(e){
    errEl.style.color="#c62828";
    errEl.textContent="エラー："+e.message;
  }
}

async function deleteUserProfile(uid){
  if(!confirm("このユーザーのプロフィールを削除しますか？\n（Firebaseのアカウント自体はFirebaseコンソールから削除してください）"))return;
  try{
    const {deleteDoc,doc:fsDoc}=await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js");
    await deleteDoc(fsDoc(window._db,"userProfiles",uid));
    renderUserTabContent();
  }catch(e){alert("削除エラー："+e.message);}
}

async function changeAdminPass(){
  const p1=document.getElementById("new-admin-pass").value;
  const p2=document.getElementById("new-admin-pass2").value;
  const msg=document.getElementById("admin-pass-msg");
  if(!p1){msg.style.color="#c62828";msg.textContent="パスワードを入力してください";return;}
  if(p1!==p2){msg.style.color="#c62828";msg.textContent="パスワードが一致しません";return;}
  _userTabAdminPass=p1;
  await save("pv_adminpass",p1);
  msg.style.color="#2e7d32";
  msg.textContent="変更しました！（次回から新しいパスワードが使えます）";
}


function toggleGuideUserSection(){
  const section=document.getElementById("guide-user-section");
  const btn=document.getElementById("guide-user-btn");
  if(!section)return;
  if(section.style.display==="none"){
    const pass=prompt("管理者パスワードを入力してください");
    if(pass===null)return;
    if(pass===_userTabAdminPass){
      section.style.display="block";
      btn.textContent="🔓 非表示にする";
    } else {
      alert("パスワードが違います");
    }
  } else {
    section.style.display="none";
    btn.textContent="🔒 表示する";
  }
}

window._appStart = async function() {
  await loadAdminPass();
  render();
};
// Firebaseの初期化が終わっていなければ待つ（通常はmoduleが先に処理される）
if (typeof window._fsSave !== 'undefined' || typeof window._appStart !== 'undefined') {
  // moduleの初期化完了後に_appStartが呼ばれる。まだなら少し待つ
}
